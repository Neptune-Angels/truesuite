<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500">
  <!-- Dark background -->
  <rect width="1500" height="500" fill="#030712"/>
  <!-- Subtle gradient overlay -->
  <defs>
    <radialGradient id="glow" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1500" height="500" fill="url(#glow)"/>

  <!-- Logo mark (emerald square, left side) -->
  <rect x="120" y="150" width="200" height="200" rx="40" fill="#10b981"/>
  <!-- QR icon inside logo mark -->
  <g transform="translate(160, 190) scale(8.33)" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
  </g>

  <!-- TrueQR wordmark -->
  <text x="360" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="700" fill="white" letter-spacing="-3">TrueQR</text>

  <!-- Tagline -->
  <text x="362" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#6b7280" letter-spacing="0">The honest QR code generator</text>

  <!-- Subtle bottom accent line -->
  <rect x="120" y="420" width="80" height="4" rx="2" fill="#10b981" opacity="0.6"/>
</svg>
